<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>Mini Project</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <div class="logo">TechStore</div>
    <ul>
      <li><a href="#">الرئيسية</a></li>
      <li><a href="#">المنتجات</a></li>
      <li><a href="#">تواصل</a></li>
    </ul>
  </nav>

  <div class="cards">

    <div class="card">
      <span class="badge">جديد</span>
      <img src="/download (1).jfif" alt="لابتوب" />
      <div class="card-body">
        <h3>لابتوب Pro X</h3>
        <p>معالج قوي، شاشة 15 بوصة، بطارية تدوم 12 ساعة.</p>
        <div class="card-footer">
          <span class="price">5,999 ج</span>
          <button>أضف للسلة</button>
        </div>
      </div>
    </div>

    <div class="card">
      <span class="badge green">خصم 20%</span>
      <img src="/download.avif" alt="سماعة" />
      <div class="card-body">
        <h3>سماعة AirSound</h3>
        <p>صوت نقي، عزل ضوضاء، بطارية 30 ساعة.</p>
        <div class="card-footer">
          <span class="price">1,200 ج</span>
          <button>أضف للسلة</button>
        </div>
      </div>
    </div>

    <div class="card">
      <span class="badge orange">الأكثر مبيعاً</span>
      <img src="/download.webp" alt="ساعة" />
      <div class="card-body">
        <h3>ساعة SmartWatch Z</h3>
        <p>تتبع صحتك، اقرأ رسائلك، وابقَ على تواصل.</p>
        <div class="card-footer">
          <span class="price">2,499 ج</span>
          <button>أضف للسلة</button>
        </div>
      </div>
    </div>

  </div>

</body>
</html>
